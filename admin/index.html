<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ShiftPvP Admin - Authentication</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="assets/admin.css">
</head>
<body class="login-page">
    <div class="stars-container"></div>
    <div class="login-wrapper">
        <div class="login-card">
            <div class="brand-header">
                <div class="logo-glow"></div>
                <h1 class="brand-title">SHIFT<span>PVP</span></h1>
                <p class="brand-subtitle">MANAGEMENT CONSOLE</p>
            </div>
            
            <form id="loginForm" class="login-form">
                <div class="form-group">
                    <label for="username">OPERATOR IDENTITY</label>
                    <div class="input-wrapper">
                        <span class="input-icon">👤</span>
                        <input type="text" id="username" autocomplete="username" required placeholder="Enter username...">
                    </div>
                </div>
                
                <div class="form-group">
                    <label for="password">ACCESS KEY</label>
                    <div class="input-wrapper">
                        <span class="input-icon">🔒</span>
                        <input type="password" id="password" autocomplete="current-password" required placeholder="••••••••">
                    </div>
                </div>

                <div id="errorMessage" class="error-banner hidden">
                    <span class="error-icon">⚠️</span>
                    <span class="error-text"></span>
                </div>
                
                <button type="submit" id="submitBtn" class="btn btn-primary btn-block">
                    <span class="btn-text">INITIALIZE SESSION</span>
                    <div class="btn-loader hidden"></div>
                </button>
            </form>
        </div>
        <div class="login-footer">
            <p>SECURE INTERFACE // AUTH_REQUIRED</p>
        </div>
    </div>

    <div id="toastContainer" class="toast-container"></div>

    <script type="module" src="assets/login.js"></script>
</body>
</html>
